name: build-windows

on:
  workflow_dispatch:        # manual "Run workflow" button
  push:
    tags: ['v*']

permissions:
  contents: write           # needed to publish the release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build installer and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by Actions
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        with:
          tagName: calm-qa-v__VERSION__
          releaseName: 'CALM QA Dashboard v__VERSION__'
          releaseDraft: false
          prerelease: false
          args: --bundles nsis